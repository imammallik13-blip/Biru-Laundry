<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil — Biru Laundry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand"><span class="brand-mark">BL</span> Biru Laundry</div>
    <div class="topbar-user">
      <a href="profil.html" class="avatar" aria-label="Profil">S</a>
      <button type="button" id="logoutBtn" class="icon-btn" aria-label="Logout" title="Logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>
    </div>
  </div>
</header>

<main class="page page-narrow">

  <a href="dashboard-customer.html" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    Kembali ke Dashboard
  </a>

  <!-- Info diri -->
  <section class="card" style="margin-bottom:20px;">
    <div class="profile-header">
      <div class="profile-avatar-lg">S</div>
      <div>
        <h2 id="profileHeaderName">Nama Pengguna</h2>
        <p id="profileJoinedText">Bergabung sejak —</p>
      </div>
    </div>

    <div class="divider"></div>

    <form id="profileForm">
      <div class="form-group">
        <label for="pNama">Nama</label>
        <input type="text" id="pNama" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="pHp">No HP</label>
          <input type="tel" id="pHp" required>
        </div>
        <div class="form-group">
          <label for="pEmail">Email</label>
          <input type="text" id="pEmail" disabled>
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
    </form>
  </section>

  <!-- Alamat tersimpan -->
  <section class="card" style="margin-bottom:20px;">
    <h3 style="font-size:1rem; margin-bottom:16px;">Alamat Tersimpan</h3>
    <div id="addressCards"></div>
    <button type="button" class="add-address-btn" id="addAddressBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      Tambah Alamat Baru
    </button>
  </section>

  <!-- Ubah password -->
  <section class="card" style="margin-bottom:20px;">
    <h3 style="font-size:1rem; margin-bottom:16px;">Ubah Password</h3>
    <form id="passwordForm">
      <div class="form-group">
        <label for="pwOld">Password Lama</label>
        <input type="password" id="pwOld" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="pwNew">Password Baru</label>
          <input type="password" id="pwNew" required>
        </div>
        <div class="form-group">
          <label for="pwConfirm">Konfirmasi Password Baru</label>
          <input type="password" id="pwConfirm" required>
        </div>
      </div>
      <button type="submit" class="btn btn-outline">Update Password</button>
    </form>
  </section>

  <!-- Logout -->
  <button type="button" id="logoutBtnBottom" class="btn btn-danger-outline btn-block">Logout</button>

</main>

<script>
  let currentUserId = null; // auth id (= profiles.id) — dipakai untuk profil & password
  let customerId    = null; // customers.id — WAJIB dipakai untuk tabel addresses
  let addresses = [];

  // =====================================================================
  // 1. LOAD DATA PROFIL & ALAMAT
  // =====================================================================
  async function loadProfileAndAddresses() {
    try {
      const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();
      if (sessionError || !session) { window.location.href = '../masuk.html'; return; }
      currentUserId = session.user.id;

      // A. Data Profil (profiles.id = auth id, ini sudah benar)
      const { data: profile, error: profileError } = await supabaseClient
        .from('profiles')
        .select('name, phone, role, created_at')
        .eq('id', currentUserId)
        .single();

      if (profileError && profileError.code !== 'PGRST116') throw profileError;

      if (profile) {
        document.getElementById('pNama').value = profile.name || '';
        document.getElementById('pHp').value = profile.phone || '';
        document.getElementById('pEmail').value = session.user.email || '';

        document.getElementById('profileHeaderName').textContent = profile.name || 'Nama Pengguna';
        if (profile.created_at) {
          const joined = new Date(profile.created_at).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
          document.getElementById('profileJoinedText').textContent = `Bergabung sejak ${joined}`;
        }

        const avatarInitial = (profile.name || 'S').charAt(0).toUpperCase();
        document.querySelectorAll('.avatar, .profile-avatar-lg').forEach(el => el.textContent = avatarInitial);
      }

      // B. Translate ke customers.id — addresses.customer_id merujuk ke customers.id
      const { data: customerRow, error: customerError } = await supabaseClient
        .from('customers')
        .select('id')
        .eq('profile_id', currentUserId)
        .maybeSingle();

      if (customerError || !customerRow) {
        console.error('Data customer tidak ditemukan:', customerError);
        document.getElementById('addressCards').innerHTML =
          '<p style="color:var(--color-muted); font-size:0.9rem;">Data pelanggan belum lengkap — hubungi admin untuk menambah alamat.</p>';
        document.getElementById('addAddressBtn').style.display = 'none';
        return;
      }
      customerId = customerRow.id;

      // C. Ambil Alamat (pakai customers.id, bukan auth id)
      const { data: dbAddresses, error: addrError } = await supabaseClient
        .from('addresses')
        .select('*')
        .eq('customer_id', customerId)
        .order('id', { ascending: true });

      if (addrError) throw addrError;

      if (dbAddresses) {
        addresses = dbAddresses.map(a => ({
          ...a,
          detail: a.full_address,
          utama: a.is_default
        }));
      }
      renderAddresses();

    } catch (err) {
      console.error("Gagal memuat data:", err);
    }
  }

  // =====================================================================
  // 2. RENDER ALAMAT
  // =====================================================================
  function renderAddresses() {
    const el = document.getElementById('addressCards');
    if (!el) return;

    if (addresses.length === 0) {
      el.innerHTML = '<p style="color:var(--color-muted); font-size:0.9rem; margin:0;">Belum ada alamat tersimpan.</p>';
      return;
    }

    el.innerHTML = addresses.map(a => `
      <div class="address-card">
        <div>
          <strong>${a.label} ${a.utama ? '<span class="address-badge" style="margin-left:6px;">Utama</span>' : ''}</strong>
          <span>${a.detail}</span>
        </div>
        <div class="address-actions">
          <button type="button" aria-label="Edit alamat" data-edit="${a.id}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
          </button>
          <button type="button" aria-label="Hapus alamat" data-delete="${a.id}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg>
          </button>
        </div>
      </div>
    `).join('');

    el.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', () => deleteAddress(btn.dataset.delete));
    });
    el.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', () => editAddress(btn.dataset.edit));
    });
  }

  // =====================================================================
  // 3. CRUD ALAMAT & PROFIL
  // =====================================================================
  document.getElementById('addAddressBtn').addEventListener('click', async () => {
    if (!customerId) return;
    const label = prompt('Label alamat baru (misal: Rumah, Kantor):');
    if (!label) return;
    const detail = prompt('Alamat lengkap:');
    if (!detail) return;

    try {
      const { data, error } = await supabaseClient
        .from('addresses')
        .insert([{
          customer_id: customerId,
          label: label,
          full_address: detail,
          is_default: addresses.length === 0
        }])
        .select();

      if (error) throw error;
      if (data) { addresses.push({ ...data[0], detail: data[0].full_address, utama: data[0].is_default }); renderAddresses(); }
    } catch (err) {
      alert("Gagal menambahkan alamat: " + err.message);
    }
  });

  async function editAddress(id) {
    const addr = addresses.find(a => a.id == id);
    if (!addr) return;
    const newLabel = prompt('Ubah Label alamat:', addr.label);
    if (!newLabel) return;
    const newDetail = prompt('Ubah Alamat lengkap:', addr.detail);
    if (!newDetail) return;

    try {
      const { error } = await supabaseClient.from('addresses').update({ label: newLabel, full_address: newDetail }).eq('id', id);
      if (error) throw error;
      addr.label = newLabel; addr.detail = newDetail; renderAddresses();
    } catch (err) {
      alert("Gagal memperbarui alamat: " + err.message);
    }
  }

  async function deleteAddress(id) {
    if (!confirm('Hapus alamat ini?')) return;
    try {
      const { error } = await supabaseClient.from('addresses').delete().eq('id', id);
      if (error) throw error;
      addresses = addresses.filter(a => a.id != id); renderAddresses();
    } catch (err) {
      alert("Gagal menghapus alamat: " + err.message);
    }
  }

  // Simpan Data Profil (profiles.id = auth id — ini tetap benar)
  document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const updatedData = {
      name: document.getElementById('pNama').value,
      phone: document.getElementById('pHp').value
    };

    try {
      const { error } = await supabaseClient.from('profiles').update(updatedData).eq('id', currentUserId);
      if (error) throw error;

      // Sinkronkan juga ke customers, supaya nama/HP konsisten di sisi admin
      if (customerId) {
        await supabaseClient.from('customers').update(updatedData).eq('id', customerId);
      }

      alert('Profil berhasil diperbarui!');
      loadProfileAndAddresses();
    } catch (err) {
      alert("Gagal menyimpan: " + err.message);
    }
  });

  // Simpan Password Baru
  const pwdForm = document.getElementById('passwordForm');
  if (pwdForm) {
    pwdForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPw = document.getElementById('pwNew').value;
      const confirmPw = document.getElementById('pwConfirm').value;

      if (newPw !== confirmPw) {
        alert('Konfirmasi password tidak cocok.'); return;
      }

      try {
        const { error } = await supabaseClient.auth.updateUser({ password: newPw });
        if (error) throw error;
        alert('Password berhasil diupdate!');
        e.target.reset();
      } catch (err) {
        alert("Gagal update password: " + err.message);
      }
    });
  }

  document.addEventListener('DOMContentLoaded', loadProfileAndAddresses);

  async function doLogout() {
    try { await supabaseClient.auth.signOut(); } catch(e) { console.error(e); }
    finally { window.location.href = '../masuk.html'; }
  }
  document.getElementById('logoutBtn').addEventListener('click', doLogout);
  document.getElementById('logoutBtnBottom').addEventListener('click', doLogout);
</script>

</body>
</html>
