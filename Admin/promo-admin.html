<link rel="stylesheet" href="../css/admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
</head>
<body>

<div class="admin-shell">

  <!-- ============== SIDEBAR ============== -->

    <nav class="sidebar-nav">

        Dashboard
      </a>
      <a href="order-masuk.html" class="sidebar-link">
        <svg viewBox="0 0 24 24"><path d="M21 8v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8"></path><path d="M3 8l2.45-4.11A2 2 0 0 1 7.18 3h9.64a2 2 0 0 1 1.73.89L21 8"></path><path d="M3 8h18"></path></svg>

      <a href="pelanggan.html" class="sidebar-link">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        Kelola Pelanggan
      </a>
      <a href="promo-admin.html" class="sidebar-link active">
        <svg viewBox="0 0 24 24"><path d="M20.59 13.41 11 3.83A2 2 0 0 0 9.59 3.24L4 3a1 1 0 0 0-1 1l.24 5.59a2 2 0 0 0 .59 1.41l9.58 9.58a2 2 0 0 0 2.83 0l4.35-4.35a2 2 0 0 0 0-2.82Z"></path><circle cx="8.5" cy="8.5" r="1"></circle></svg>
        Kelola Promo
      </a>
    </nav>

    <div class="sidebar-foot">
      <a href="#" id="logoutLink" class="sidebar-link">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Logout
      </a>
    </div>
  </aside>

  <!-- ============== KONTEN UTAMA ============== -->
  <main class="admin-main">

    <div class="admin-topbar">
      <div>
        <h1>Kelola Promo</h1>
        <p id="totalCountText">Memuat data promo...</p>
      </div>
      <div class="admin-user">
        <button type="button" class="btn btn-primary btn-sm" id="addPromoBtn">+ Tambah Promo</button>
      </div>
    </div>

    <!-- Tabel promo -->
    <div class="table-wrapper">
      <table class="orders-table">
        <thead>
          <tr>
            <th>Judul</th>
            <th>Kode</th>
            <th>Deskripsi</th>
            <th>Berlaku Sampai</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="promoTableBody">
          <tr><td colspan="6" class="table-empty">Memuat data promo...</td></tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<!-- ============== MODAL: TAMBAH / EDIT PROMO ============== -->
<div class="modal-overlay hidden" id="promoModalOverlay">
  <div class="modal-box">
    <h3 id="promoModalTitle">Tambah Promo</h3>
    <p class="modal-sub">Promo yang aktif akan langsung tampil di halaman Promo milik pelanggan.</p>

    <div class="modal-field">
      <label for="promoTitleInput">Judul Promo</label>
      <input type="text" id="promoTitleInput" placeholder="Misal: Diskon 20% Kiloan">
    </div>
    <div class="modal-field">
      <label for="promoDescInput">Deskripsi</label>
      <input type="text" id="promoDescInput" placeholder="Misal: Berlaku untuk semua layanan kiloan">
    </div>
    <div class="modal-field">
      <label for="promoCodeInput">Kode Promo</label>
      <input type="text" id="promoCodeInput" placeholder="Misal: HEMAT20" style="text-transform:uppercase;">
    </div>
    <div class="modal-field">
      <label for="promoValidUntilInput">Berlaku Sampai <span style="font-weight:400; color:var(--color-muted);">— opsional</span></label>
      <input type="date" id="promoValidUntilInput">
    </div>

    <div class="modal-actions">
      <button type="button" class="btn btn-outline" id="promoModalCancelBtn">Batal</button>
      <button type="button" class="btn btn-primary" id="promoModalSaveBtn">Simpan</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// HELPERS
// ============================================================
function formatTanggal(dateStr){
  if (!dateStr) return '—';
  return new Date(dateStr).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
}

function isExpired(validUntil){
  if (!validUntil) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  return new Date(validUntil) < today;
}

// ============================================================
// STATE
// ============================================================
let allPromos = [];
let editingPromoId = null; // null = mode tambah, terisi = mode edit

// ============================================================
// RENDER
// ============================================================
function renderTable(){
  const tbody = document.getElementById('promoTableBody');

  if (!allPromos || allPromos.length === 0){
    tbody.innerHTML = `<tr><td colspan="6" class="table-empty">Belum ada promo. Klik "+ Tambah Promo" buat bikin yang pertama.</td></tr>`;
    return;
  }

  tbody.innerHTML = allPromos.map(p => {
    const desc = p.description || p.desc || '—';
    const expired = isExpired(p.valid_until);
    const statusChip = expired
      ? `<span class="chip chip-batal">Kedaluwarsa</span>`
      : `<span class="chip chip-selesai">Aktif</span>`;

    return `
      <tr>
        <td><strong>${p.title || 'Promo Menarik'}</strong></td>
        <td><span class="promo-code" style="padding:4px 10px; font-size:0.82rem;">${p.code || '-'}</span></td>
        <td class="promo-desc-cell" title="${desc}">${desc}</td>
        <td>${formatTanggal(p.valid_until)}</td>
        <td>${statusChip}</td>
        <td>
          <button class="row-action promo-edit-btn" data-id="${p.id}">Edit</button>
          &nbsp;·&nbsp;
          <button class="row-action promo-delete-btn" data-id="${p.id}" style="color:var(--color-error);">Hapus</button>
        </td>
      </tr>`;
  }).join('');

  tbody.querySelectorAll('.promo-edit-btn').forEach(btn => {
    btn.addEventListener('click', () => openPromoModal(btn.dataset.id));
  });
  tbody.querySelectorAll('.promo-delete-btn').forEach(btn => {
    btn.addEventListener('click', () => deletePromo(btn.dataset.id));
  });
}

// ============================================================
// MODAL TAMBAH / EDIT
// ============================================================
function openPromoModal(promoId){
  editingPromoId = promoId || null;
  const promo = promoId ? allPromos.find(p => p.id === promoId) : null;

  document.getElementById('promoModalTitle').textContent = promo ? 'Edit Promo' : 'Tambah Promo';
  document.getElementById('promoTitleInput').value = promo?.title || '';
  document.getElementById('promoDescInput').value = promo?.description || promo?.desc || '';
  document.getElementById('promoCodeInput').value = promo?.code || '';
  document.getElementById('promoValidUntilInput').value = promo?.valid_until ? promo.valid_until.slice(0,10) : '';

  document.getElementById('promoModalOverlay').classList.remove('hidden');
}

function closePromoModal(){
  document.getElementById('promoModalOverlay').classList.add('hidden');
  editingPromoId = null;
}

document.getElementById('addPromoBtn').addEventListener('click', () => openPromoModal(null));
document.getElementById('promoModalCancelBtn').addEventListener('click', closePromoModal);
document.getElementById('promoModalOverlay').addEventListener('click', (e) => {
  if (e.target.id === 'promoModalOverlay') closePromoModal();
});

document.getElementById('promoModalSaveBtn').addEventListener('click', async () => {
  const title = document.getElementById('promoTitleInput').value.trim();
  const desc = document.getElementById('promoDescInput').value.trim();
  const code = document.getElementById('promoCodeInput').value.trim().toUpperCase();
  const validUntil = document.getElementById('promoValidUntilInput').value || null;

  if (!title || !code){
    alert('Judul promo dan kode promo wajib diisi.');
    return;
  }

  const payload = { title, description: desc, code, valid_until: validUntil };

  let error;
  if (editingPromoId){
    ({ error } = await supabaseClient.from('promos').update(payload).eq('id', editingPromoId));
  } else {
    ({ error } = await supabaseClient.from('promos').insert(payload));
  }

  if (error){
    console.error(error);
    alert('Gagal menyimpan promo: ' + error.message);
    return;
  }

  closePromoModal();
  await loadPromos();
});

// ============================================================
// HAPUS PROMO
// ============================================================
async function deletePromo(promoId){
  if (!confirm('Hapus promo ini? Promo akan langsung hilang dari halaman pelanggan.')) return;

  const { error } = await supabaseClient.from('promos').delete().eq('id', promoId);
  if (error){
    console.error(error);
    alert('Gagal menghapus promo: ' + error.message);
    return;
  }
  await loadPromos();
}

// ============================================================
// LOAD DATA
// ============================================================
async function loadPromos(){
  const { data, error } = await supabaseClient
    .from('promos')
    .select('*')
    .order('created_at', { ascending: false });

  if (error){
    console.error(error);
    document.getElementById('promoTableBody').innerHTML =
      `<tr><td colspan="6" class="table-empty">Gagal memuat data promo. Coba refresh halaman.</td></tr>`;
    return;
  }

  allPromos = data || [];
  document.getElementById('totalCountText').textContent = `${allPromos.length} promo tersimpan`;
  renderTable();
}

// ============================================================
// INIT
// ============================================================
(async () => {

  // ── AUTH GUARD — hanya admin/staff yang boleh akses ────────
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) { window.location.href = '../masuk.html'; return; }

  const { data: profile } = await supabaseClient
    .from('profiles')
    .select('role')
    .eq('id', session.user.id)
    .single();

  if (!profile || (profile.role !== 'admin' && profile.role !== 'owner')) {
    window.location.href = '../masuk.html';
    return;
  }

  await loadPromos();

})();

// ── LOGOUT ──────────────────────────────────────────────────
document.getElementById('logoutLink').addEventListener('click', async (e) => {
  e.preventDefault();
  try { await supabaseClient.auth.signOut(); } catch(err) { console.error(err); }
  finally { window.location.href = '../masuk.html'; }
});
</script>

</body>
</html>
