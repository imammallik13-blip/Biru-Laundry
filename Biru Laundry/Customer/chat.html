<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Bantuan — Biru Laundry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand"><span class="brand-mark">BL</span> Biru Laundry</div>
    <div class="topbar-user">
      <a href="profil.html" class="avatar" aria-label="Profil">S</a>
      <button type="button" id="logoutBtn" class="icon-btn" aria-label="Logout" title="Logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>
    </div>
  </div>
</header>

<main class="page page-narrow">

  <a href="dashboard-customer.html" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    Kembali ke Dashboard
  </a>

  <div class="greeting">
    <span class="eyebrow">Chat Bantuan</span>
    <h1>Ada yang bisa dibantu?</h1>
    <p>Rata-rata dibalas dalam 15 menit.</p>
  </div>

  <section class="card">
    <div class="chat-window" id="chatWindow"></div>

    <div class="quick-replies">
      <button type="button" class="quick-reply" data-text="Kapan laundry saya selesai?">Kapan selesai?</button>
      <button type="button" class="quick-reply" data-text="Bisa jemput laundry?">Bisa jemput laundry saya?</button>
      <button type="button" class="quick-reply" data-text="Saya mau komplain kualitas cucian">Komplain kualitas</button>
    </div>

    <form class="chat-input-row" id="chatForm">
      <input type="text" id="chatInput" placeholder="Tulis pesan..." autocomplete="off" required>
      <button type="submit" class="chat-send-btn" aria-label="Kirim">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </form>
  </section>

</main>

<script>
  const chatWindow = document.getElementById('chatWindow');
  const chatForm = document.getElementById('chatForm');
  const chatInput = document.getElementById('chatInput');

  let currentUserId = null; // auth id — dipakai untuk profil/avatar saja
  let customerId    = null; // customers.id — WAJIB dipakai untuk tabel messages

  function formatTime(timestamp) {
    const d = timestamp ? new Date(timestamp) : new Date();
    return d.getHours().toString().padStart(2, '0') + '.' + d.getMinutes().toString().padStart(2, '0');
  }

  function addBubble(text, who, timestamp) {
    const row = document.createElement('div');
    row.className = 'chat-row ' + (who === 'customer' ? 'me' : 'staff');
    row.innerHTML = `<div class="chat-bubble">${text}<span class="chat-time">${formatTime(timestamp)}</span></div>`;
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  async function loadChatHistory() {
    try {
      const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();
      if (sessionError || !session) { window.location.href = '../masuk.html'; return; }
      currentUserId = session.user.id;

      const { data: profile } = await supabaseClient.from('profiles').select('name').eq('id', currentUserId).single();
      if (profile) document.querySelector('.avatar').textContent = (profile.name || 'U').charAt(0).toUpperCase();

      // Translate ke customers.id — messages.customer_id merujuk ke customers.id, bukan auth id
      const { data: customerRow, error: customerError } = await supabaseClient
        .from('customers').select('id').eq('profile_id', currentUserId).maybeSingle();

      if (customerError || !customerRow) {
        console.error('Data customer tidak ditemukan:', customerError);
        addBubble('Data pelanggan kamu belum lengkap. Hubungi admin dulu ya sebelum chat.', 'staff');
        chatInput.disabled = true;
        return;
      }
      customerId = customerRow.id;

      const { data: chatData, error: msgError } = await supabaseClient
        .from('messages')
        .select('*')
        .eq('customer_id', customerId)
        .order('created_at', { ascending: true });

      if (msgError) throw msgError;

      if (chatData && chatData.length > 0) {
        chatData.forEach(msg => {
          const senderType = msg.sender_role === 'staff' || msg.is_from_staff ? 'staff' : 'customer';
          addBubble(msg.text, senderType, msg.created_at);
        });
      } else {
        addBubble('Halo! Ada yang bisa kami bantu? Silakan kirim pesan di sini ya. 🙏', 'staff');
      }

    } catch (err) {
      console.error("Gagal memuat chat:", err);
      addBubble('Gagal memuat riwayat pesan: ' + err.message, 'staff');
    }
  }

  async function sendMessage(e) {
    e.preventDefault();

    const text = chatInput.value.trim();
    if (!text || !customerId) return;

    const messageData = {
      customer_id: customerId,
      text: text,
      sender_role: 'customer',
      is_from_staff: false,
      created_at: new Date()
    };

    addBubble(text, 'customer');
    chatInput.value = '';

    try {
      const { error } = await supabaseClient
        .from('messages')
        .insert([messageData]);

      if (error) {
        console.error("Gagal mengirim ke DB:", error);
        alert("Pesan gagal terkirim ke server: " + error.message);
      }
    } catch (err) {
      console.error("Error kirim pesan:", err);
    }
  }

  function setupQuickReplies() {
    const quickBtns = document.querySelectorAll('.quick-reply');
    quickBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const quickText = btn.dataset.text || btn.textContent.trim();
        chatInput.value = "";
        let i = 0;
        function typeWriter() {
          if (i < quickText.length) {
            chatInput.value += quickText.charAt(i);
            i++;
            setTimeout(typeWriter, 20);
          }
        }
        typeWriter();
        chatInput.focus();
      });
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadChatHistory();
    setupQuickReplies();
  });

  chatForm.addEventListener('submit', sendMessage);

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try { await supabaseClient.auth.signOut(); } catch(e) {}
    finally { window.location.href = '../masuk.html'; }
  });
</script>

</body>
</html>
