    <div class="sidebar-foot">
      <a href="#" id="logoutLink" class="sidebar-link">

        Logout
      </a>
    </div>
  </aside>

  <!-- ============== KONTEN UTAMA ============== -->
  <main class="admin-main">

    <div class="admin-topbar">
      <div>
        <h1>Order Masuk</h1>
        <p>Order baru dari customer via website — konfirmasi jadwal pickup atau tunggu customer datang.</p>
      </div>
    </div>

    <!-- Tabs -->
    <div class="om-tabs">
      <button type="button" class="om-tab active" data-tab="pickup">
        Pickup <span class="om-count" id="countPickupTab">0</span>
      </button>
      <button type="button" class="om-tab" data-tab="antar">
        Antar Sendiri <span class="om-count" id="countAntarTab">0</span>
      </button>
    </div>

    <!-- List: Pickup -->
    <div class="om-list" id="listPickup"></div>

    <!-- List: Antar Sendiri -->
    <div class="om-list" id="listAntar" style="display:none;"></div>

  </main>
</div>

<!-- ============== MODAL: Jadwalkan Pickup ============== -->
<div class="modal-overlay hidden" id="scheduleModal">
  <div class="modal-box">
    <h3>Jadwalkan Pickup</h3>
    <p class="modal-sub" id="modalCustName">Tentukan tanggal & jam penjemputan.</p>

    <div class="modal-field">
      <label for="modalDate">Tanggal Pickup</label>
      <input type="date" id="modalDate">
    </div>
    <div class="modal-field">
      <label for="modalTime">Jam Pickup</label>
      <input type="time" id="modalTime">
    </div>

    <div class="modal-actions">
      <button type="button" class="btn btn-outline" id="modalCancel">Batal</button>
      <button type="button" class="btn btn-primary" id="modalConfirm">Konfirmasi Jadwal</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// MAP PATTERN
// ============================================================
const STATUS_MAP = {
  menunggu_konfirmasi: { label: 'Menunggu Konfirmasi' },
  menunggu_dijemput:   { label: 'Menunggu Dijemput' },
};

function formatOrderNumber(n){
  return `BL-${String(n).padStart(5, '0')}`;
}

function formatTanggal(dateStr){
  if (!dateStr) return '-';
  return new Date(dateStr).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
}

function toWaLink(phone){
  if (!phone) return '#';
  let digits = phone.replace(/[^0-9]/g, '');
  if (digits.startsWith('0')) digits = '62' + digits.slice(1);
  return `https://wa.me/${digits}`;
}

// ============================================================
// STATE
// ============================================================
let pickupOrders = [];
let antarOrders = [];
let activeOrderIdForModal = null;

// ============================================================
// RENDER
// ============================================================
function renderPickupList(){
  const wrap = document.getElementById('listPickup');
  document.getElementById('countPickupTab').textContent = pickupOrders.length;

  if (pickupOrders.length === 0){
    wrap.innerHTML = `<div class="table-empty">Tidak ada order pickup yang menunggu konfirmasi.</div>`;
    return;
  }

  wrap.innerHTML = pickupOrders.map(o => {
    const alamat = o.addresses ? `${o.addresses.label ? o.addresses.label + ' — ' : ''}${o.addresses.full_address}` : 'Alamat tidak ditemukan';
    const requestedInfo = (o.pickup_date && o.status === 'menunggu_konfirmasi')
      ? `<span class="om-requested">Diminta: ${formatTanggal(o.pickup_date)}${o.pickup_time ? ', ' + o.pickup_time.slice(0,5) : ''}</span>`
      : '';
    const isScheduled = o.status === 'menunggu_dijemput';

    return `
      <div class="om-card" data-order-id="${o.id}">
        <div class="om-card-info">
          <p class="om-order-no">#${formatOrderNumber(o.order_number)}</p>
          <p class="om-cust">${o.customerName || '-'} <span>· ${o.customerPhone || ''}</span></p>

          <div class="om-meta-row">
            <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            <span>${alamat}</span>
          </div>
          ${o.notes ? `
          <div class="om-meta-row">
            <svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
            <span>${o.notes}</span>
          </div>` : ''}

          ${isScheduled
            ? `<span class="om-requested" style="background:#E4EFF2;color:var(--color-primary);">Terjadwal: ${formatTanggal(o.pickup_date)}${o.pickup_time ? ', ' + o.pickup_time.slice(0,5) : ''}</span>`
            : requestedInfo}
        </div>

        <div class="om-card-actions">
          <button type="button" class="btn btn-primary btn-schedule" data-id="${o.id}" data-date="${o.pickup_date || ''}" data-time="${o.pickup_time || ''}" data-name="${o.customerName || ''}">
            ${isScheduled ? 'Ubah Jadwal' : 'Jadwalkan Pickup'}
          </button>
          <a class="btn btn-whatsapp" href="${toWaLink(o.customerPhone)}" target="_blank" rel="noopener">Hubungi via WA</a>
          <button type="button" class="btn btn-danger-outline btn-cancel" data-id="${o.id}">Batalkan</button>
        </div>
      </div>`;
  }).join('');

  attachCardEvents();
}

function renderAntarList(){
  const wrap = document.getElementById('listAntar');
  document.getElementById('countAntarTab').textContent = antarOrders.length;

  if (antarOrders.length === 0){
    wrap.innerHTML = `<div class="table-empty">Tidak ada order antar sendiri yang menunggu.</div>`;
    return;
  }

  wrap.innerHTML = antarOrders.map(o => `
      <div class="om-card" data-order-id="${o.id}">
        <div class="om-card-info">
          <p class="om-order-no">#${formatOrderNumber(o.order_number)}</p>
          <p class="om-cust">${o.customerName || '-'} <span>· ${o.customerPhone || ''}</span></p>

          ${o.weight_kg ? `
          <div class="om-meta-row">
            <svg viewBox="0 0 24 24"><path d="M6.5 6.5h11a2 2 0 0 1 2 2.3l-1.2 8.5a2 2 0 0 1-2 1.7H7.7a2 2 0 0 1-2-1.7l-1.2-8.5a2 2 0 0 1 2-2.3Z"></path></svg>
            <span>Estimasi berat: ${o.weight_kg} kg</span>
          </div>` : ''}
          ${o.notes ? `
          <div class="om-meta-row">
            <svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
            <span>${o.notes}</span>
          </div>` : ''}

          <span class="om-requested">Menunggu customer datang ke toko</span>
        </div>

        <div class="om-card-actions">
          <a class="btn btn-whatsapp" href="${toWaLink(o.customerPhone)}" target="_blank" rel="noopener">Hubungi via WA</a>
          <button type="button" class="btn btn-danger-outline btn-cancel" data-id="${o.id}">Batalkan</button>
        </div>
      </div>`
  ).join('');

  attachCardEvents();
}

function attachCardEvents(){
  document.querySelectorAll('.btn-schedule').forEach(btn => {
    btn.addEventListener('click', () => openScheduleModal(btn.dataset));
  });
  document.querySelectorAll('.btn-cancel').forEach(btn => {
    btn.addEventListener('click', () => cancelOrder(btn.dataset.id));
  });
}

// ============================================================
// MODAL JADWAL PICKUP
// ============================================================
function openScheduleModal(data){
  activeOrderIdForModal = data.id;
  document.getElementById('modalCustName').textContent =
    `Tentukan tanggal & jam penjemputan untuk ${data.name || 'pelanggan ini'}.`;
  document.getElementById('modalDate').value = data.date || '';
  document.getElementById('modalTime').value = data.time ? data.time.slice(0,5) : '';
  document.getElementById('scheduleModal').classList.remove('hidden');
}

function closeScheduleModal(){
  activeOrderIdForModal = null;
  document.getElementById('scheduleModal').classList.add('hidden');
}

document.getElementById('modalCancel').addEventListener('click', closeScheduleModal);
document.getElementById('scheduleModal').addEventListener('click', (e) => {
  if (e.target.id === 'scheduleModal') closeScheduleModal();
});

document.getElementById('modalConfirm').addEventListener('click', async () => {
  const date = document.getElementById('modalDate').value;
  const time = document.getElementById('modalTime').value;

  if (!date || !time){
    alert('Tanggal dan jam pickup wajib diisi.');
    return;
  }

  const { error } = await supabaseClient
    .from('orders')
    .update({ pickup_date: date, pickup_time: time, status: 'menunggu_dijemput' })
    .eq('id', activeOrderIdForModal);

  if (error){
    console.error(error);
    alert('Gagal menyimpan jadwal. Coba lagi.');
    return;
  }

  closeScheduleModal();
  await loadOrders();
});

// ============================================================
// BATALKAN ORDER
// ============================================================
async function cancelOrder(orderId){
  const yakin = confirm('Batalkan order ini? Customer perlu dihubungi manual untuk konfirmasi pembatalan.');
  if (!yakin) return;

  const { error } = await supabaseClient
    .from('orders')
    .update({ status: 'dibatalkan' })
    .eq('id', orderId);

  if (error){
    console.error(error);
    alert('Gagal membatalkan order.');
    return;
  }

  await loadOrders();
}

// ============================================================
// TABS
// ============================================================
function switchTab(tabName){
  document.querySelectorAll('.om-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
  const isPickup = tabName === 'pickup';
  document.getElementById('listPickup').style.display = isPickup ? 'flex' : 'none';
  document.getElementById('listAntar').style.display = isPickup ? 'none' : 'flex';
}

document.querySelectorAll('.om-tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});

// ============================================================
// HIGHLIGHT ORDER DARI LINK EKSTERNAL (mis. tombol "Lihat →" di Dashboard)
// ============================================================
function highlightOrderCard(orderId){
  const card = document.querySelector(`.om-card[data-order-id="${orderId}"]`);
  if (!card) return; // order mungkin sudah lanjut ke tahap berikutnya (di luar Order Masuk)

  card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  card.classList.add('om-card-highlight');
  setTimeout(() => card.classList.remove('om-card-highlight'), 2500);
}

function applyIncomingLinkParams(){
  const params = new URLSearchParams(window.location.search);
  const tabParam = params.get('tab');
  const highlightId = params.get('highlight');

  let targetTab = (tabParam === 'pickup' || tabParam === 'antar') ? tabParam : null;

  // Kalau tab tidak disebutkan tapi ada highlight, cari sendiri order-nya ada di tab mana
  if (!targetTab && highlightId){
    if (pickupOrders.some(o => o.id === highlightId)) targetTab = 'pickup';
    else if (antarOrders.some(o => o.id === highlightId)) targetTab = 'antar';
  }

  if (targetTab) switchTab(targetTab);
  if (highlightId) highlightOrderCard(highlightId);
}

// ============================================================
// LOAD DATA
// ============================================================
async function loadOrders(){
  const { data: orders, error } = await supabaseClient
    .from('orders')
    .select(`
      id, order_number, order_source, status, pickup_date, pickup_time,
      weight_kg, notes, created_at,
      customers ( name, phone ),
      addresses ( label, full_address )
    `)
    .in('status', ['menunggu_konfirmasi', 'menunggu_dijemput'])
    .order('created_at', { ascending: true });

  if (error){
    console.error(error);
    document.getElementById('listPickup').innerHTML =
      `<div class="table-empty">Gagal memuat data order. Coba refresh halaman.</div>`;
    return;
  }

  const mapped = (orders || []).map(o => ({
    ...o,
    customerName: o.customers?.name,
    customerPhone: o.customers?.phone,
  }));

  pickupOrders = mapped.filter(o => o.order_source === 'pickup');
  antarOrders  = mapped.filter(o => o.order_source === 'antar');

  renderPickupList();
  renderAntarList();
}

// ============================================================
// INIT
// ============================================================
(async () => {

  // ── AUTH GUARD ──────────────────────────────────────────────
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) { window.location.href = '../masuk.html'; return; }

  const { data: profile } = await supabaseClient
    .from('profiles')
    .select('role')
    .eq('id', session.user.id)
    .single();

  if (!profile || (profile.role !== 'admin' && profile.role !== 'owner')) {
    window.location.href = '../masuk.html';
    return;
  }

  await loadOrders();
  applyIncomingLinkParams();

})();

// ── LOGOUT ──────────────────────────────────────────────────
document.getElementById('logoutLink').addEventListener('click', async (e) => {
  e.preventDefault();
  try { await supabaseClient.auth.signOut(); } catch(err) { console.error(err); }
  finally { window.location.href = '../masuk.html'; }
});
</script>

</body>
